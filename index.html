<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/geospatial-study/revisitAssets/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReVISit</title>

    <link rel="stylesheet" href="/geospatial-study/revisitAssets/cssOverrides.css" />

    <!-- Required for react browser router on GitHub pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <script type="module" crossorigin src="/geospatial-study/assets/index-Df4J2frR.js"></script>
    <link rel="stylesheet" crossorigin href="/geospatial-study/assets/index-D4TIUorx.css">
  </head>
  <body style="margin: 0;">
    <div id="desktop-only-notice" style="display:none; font-family: sans-serif; text-align:center; padding: 4rem 1rem;">
      <h2>Desktop Only</h2>
      <p>This study is only available on a desktop or laptop computer. Please revisit this link on a desktop device.</p>
    </div>
    <div id="root"></div>
    <script>
      if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        document.getElementById('desktop-only-notice').style.display = 'block';
        document.getElementById('root').style.display = 'none';
      }
    </script>
  </body>
</html>
