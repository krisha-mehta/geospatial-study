<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animated Pixel Map Survey Uncertainty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/d3-scale-chromatic.v3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="../../../revisitUtilities/revisit-communicate.js"></script>

<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0 auto;
    width: 900px;
    height: 600px;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #fff;
  }

  .wrap {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
  }

  .map-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    min-width: 0;
    gap: 2px;
  }

  .map-label {
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 0;
    text-align: center;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
    background: #fff;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }

  .county { stroke: #777; stroke-width: 0.8; vector-effect: non-scaling-stroke; }
  .state-outline { fill: none; stroke: #222; stroke-width: 1.2; vector-effect: non-scaling-stroke; }

  .legend-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    gap: 12px;
  }

  #pixel-legend, #choro-legend { width: 60px; }

  .response-container {
    max-width: 600px;
    margin: 30px auto;
    padding: 0 12px;
  }

  .response-label {
    display: block;
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 8px;
    color: #111;
  }

  .response-textarea {
    width: 100%;
    min-height: 120px;
    padding: 12px;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 14px;
    border: 2px solid #d1d5db;
    border-radius: 8px;
    resize: vertical;
    transition: border-color 0.2s;
  }

  .response-textarea:focus {
    outline: none;
    border-color: #2563eb;
  }

  .response-textarea::placeholder {
    color: #9ca3af;
  }

  .survey-title {
    font-size: 24px;
    font-weight: 700;
    color: #111;
    text-align: center;
    margin: 20px 0 10px 0;
  }
</style>
</head>
<body>

<h1 class="survey-title">Survey Questionnaire</h1>

<div class="wrap">
  <!-- Animated pixel map column -->
  <div class="map-col">
    <div class="map-label">Animated Pixel Map</div>
    <svg id="pixel-map" viewBox="0 0 400 400" aria-label="Animated pixel map of selected state"></svg>
  </div>

  <div class="map-col">
    <div class="map-label">Choropleth Map</div>
    <svg id="choropleth" viewBox="0 0 400 400" aria-label="Choropleth map of selected state"></svg>
  </div>

  <div class="legend-col">
    <svg id="pixel-legend" viewBox="0 0 140 400" aria-label="Animated pixel map legend"></svg>
    <svg id="choro-legend" viewBox="0 0 140 400" aria-label="Poverty rate legend"></svg>
  </div>
</div>

<div class="response-container">
  <label for="response-text" class="response-label">
Above, you can see two maps based on the same underlying data. The map on the right shows estimated poverty rates only. The map on the left (the one you just used) shows estimated poverty rates along with uncertainty information. Which of the two maps would you prefer to use for making decisions like the one in this experiment? Please explain your choice.</label>
  <textarea
    id="response-text"
    class="response-textarea"
    placeholder="Type your response here..."
    aria-label="Open response text box"></textarea>
</div>

<script>
const CONFIG = {
  MOE_Z: 1.645,
  N_FRAMES: 50,
  FPS: 2.5,
  PIXEL: 3
};

const VALUE_MIN = 0, VALUE_MAX = 50;

const svgPixel       = d3.select("#pixel-map");
const svgChoropleth  = d3.select("#choropleth");
const svgPixelLegend = d3.select("#pixel-legend");
const svgChoroLegend = d3.select("#choro-legend");

const pixelColor = d3.scaleSequential(d3.interpolateYlOrRd)
  .domain([VALUE_MIN, VALUE_MAX])
  .clamp(true);

const choroColor = d3.scaleSequential(d3.interpolateYlOrRd)
  .domain([VALUE_MIN, VALUE_MAX])
  .clamp(true);

const norm = s => (s||"").normalize("NFD").replace(/\p{Diacritic}/gu,"").toLowerCase().trim();
const stripTypeSuffix = s =>
  s.replace(/\b(county|parish|borough|census area|municipio|municipality)\b/gi, "")
   .replace(/\s+/g, " ").trim();

const width = 400, height = 400;
const projection = d3.geoEquirectangular();
const path = d3.geoPath(projection);

function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function randnFactory(rng) {
  let spare = null;
  return () => {
    if (spare !== null) { const v = spare; spare = null; return v; }
    let u = 0, v = 0, s = 0;
    do { u = rng() * 2 - 1; v = rng() * 2 - 1; s = u * u + v * v; } while (s === 0 || s >= 1);
    const m = Math.sqrt(-2 * Math.log(s) / s);
    spare = v * m;
    return u * m;
  };
}
function sampleValue(pov, moe, randn) {
  const sd = (moe ?? 0) / CONFIG.MOE_Z;
  const x = pov + (sd > 0 ? randn() * sd : 0);
  return Math.max(VALUE_MIN, Math.min(VALUE_MAX, x));
}

let defsMap, gPixels, gState, gCounties, state = { frame: 0, frameValues: [] };

function renderFrame(k) {
  const frameIdx = (k % CONFIG.N_FRAMES + CONFIG.N_FRAMES) % CONFIG.N_FRAMES;
  state.frame = frameIdx;
  const vals = state.frameValues[frameIdx];
  gPixels.selectAll("rect").attr("fill", (d, i) => pixelColor(vals[i]));
}

let lastTick = 0;
function loop(ts) {
  const interval = 1000 / CONFIG.FPS;
  if (ts - lastTick >= interval) {
    lastTick = ts;
    renderFrame(state.frame + 1);
  }
  requestAnimationFrame(loop);
}

let loopStarted = false;
function startLoopOnce() { if (!loopStarted) { loopStarted = true; requestAnimationFrame(loop); } }

async function loadData(stateFips, csvFile) {
  const [usTopo, csv] = await Promise.all([
    d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json"),
    d3.csv(csvFile, d3.autoType)
  ]);

  const allCounties = topojson.feature(usTopo, usTopo.objects.counties).features;
  const stateCounties = allCounties.filter(f => String(f.id).startsWith(stateFips));
  const stateFeature = topojson.feature(usTopo, usTopo.objects.states).features
    .find(f => String(f.id) === stateFips);

  projection.fitSize([width, height], { type: "FeatureCollection", features: stateCounties });

  const nameToFipsMap = new Map();
  for (const f of stateCounties) {
    const id = String(f.id);
    const raw = f.properties?.name ?? "";
    nameToFipsMap.set(norm(stripTypeSuffix(raw)), id);
    if (/\bsaint\b/i.test(raw)) {
      nameToFipsMap.set(norm(stripTypeSuffix(raw.replace(/\bsaint\b/gi, "st"))), id);
      nameToFipsMap.set(norm(stripTypeSuffix(raw.replace(/\bsaint\b/gi, "st."))), id);
    }
    if (/\bst[.]?\b/iu.test(raw)) {
      nameToFipsMap.set(norm(stripTypeSuffix(raw.replace(/\bst[.]?\b/giu, "saint"))), id);
    }
  }

  const byFips = new Map();
  for (const r of csv) {
    const rawName = String(r.county ?? r.NAME ?? "");
    const key = norm(stripTypeSuffix(rawName));
    const fips = nameToFipsMap.get(key);
    if (fips) {
      byFips.set(fips, { pov: +r.pov, moe: +r.moe, name: rawName });
    } else {
      console.warn(`No FIPS match for "${rawName}" in state ${stateFips}`);
    }
  }

  // Set up animated pixel map SVG layers
  svgPixel.selectAll("*").remove();
  defsMap   = svgPixel.append("defs");
  gPixels   = svgPixel.append("g").attr("class", "pixels");
  gState    = svgPixel.append("g").attr("class", "state");
  gCounties = svgPixel.append("g").attr("class", "counties");

  defsMap.append("clipPath").attr("id", "stateClip")
    .append("path").attr("d", path(stateFeature));
  gState.append("path")
    .attr("d", path(stateFeature))
    .attr("fill", "none").attr("stroke", "#595959").attr("stroke-width", 1)
    .attr("vector-effect", "non-scaling-stroke");
  gCounties.append("path")
    .attr("d", path(topojson.mesh(usTopo, usTopo.objects.counties,
      (a, b) => String(a.id).startsWith(stateFips) && String(b.id).startsWith(stateFips) && a !== b)))
    .attr("fill", "none").attr("stroke", "#595959").attr("stroke-width", 1)
    .attr("vector-effect", "non-scaling-stroke");

  const pixels = [];
  for (let y = CONFIG.PIXEL / 2; y < height; y += CONFIG.PIXEL) {
    for (let x = CONFIG.PIXEL / 2; x < width; x += CONFIG.PIXEL) {
      const lonlat = projection.invert([x, y]);
      if (!lonlat) continue;
      let rec = null;
      for (const f of stateCounties) {
        if (d3.geoContains(f, lonlat)) { rec = byFips.get(String(f.id)); break; }
      }
      if (!rec) continue;
      pixels.push({ x, y, pov: rec.pov, moe: rec.moe });
    }
  }

  const rng = mulberry32(42);
  const randn = randnFactory(rng);
  const frameValues = [];
  for (let k = 0; k < CONFIG.N_FRAMES; k++) {
    const vals = new Float32Array(pixels.length);
    for (let i = 0; i < pixels.length; i++) {
      vals[i] = sampleValue(pixels[i].pov, pixels[i].moe, randn);
    }
    frameValues.push(vals);
  }
  state.frameValues = frameValues;
  state.frame = 0;

  gPixels.attr("clip-path", "url(#stateClip)")
    .selectAll("rect")
    .data(pixels)
    .join("rect")
      .attr("x", d => d.x - CONFIG.PIXEL / 2)
      .attr("y", d => d.y - CONFIG.PIXEL / 2)
      .attr("width", CONFIG.PIXEL)
      .attr("height", CONFIG.PIXEL)
      .attr("fill", (d, i) => pixelColor(frameValues[0][i]));

  // Draw choropleth (raw pov values, YlOrRd)
  svgChoropleth.selectAll("*").remove();
  svgChoropleth.selectAll(".county-choro")
    .data(stateCounties)
    .join("path")
      .attr("class", "county-choro")
      .attr("d", path)
      .attr("fill", d => {
        const rec = byFips.get(String(d.id));
        return rec ? choroColor(rec.pov) : "#ccc";
      })
      .attr("stroke", "#595959")
      .attr("stroke-width", 0.8)
      .attr("vector-effect", "non-scaling-stroke");
  svgChoropleth.append("path")
    .datum(stateFeature)
    .attr("fill", "none")
    .attr("stroke", "#595959")
    .attr("stroke-width", 1)
    .attr("vector-effect", "non-scaling-stroke")
    .attr("d", path);

  // Gradient legend for the animated pixel map
  svgPixelLegend.selectAll("*").remove();
  const defsP = svgPixelLegend.append("defs");
  {
    const LEGEND_LEFT = 40, LEGEND_TOP = 40, LEGEND_LONG = 320, LEGEND_THICK = 15;
    const lg = svgPixelLegend.append("g")
      .attr("transform", `translate(${LEGEND_LEFT}, ${LEGEND_TOP})`)
      .style("pointer-events", "none");
    const grad = defsP.append("linearGradient")
      .attr("id", "pixelLegendGrad")
      .attr("x1", "0%").attr("x2", "0%")
      .attr("y1", "100%").attr("y2", "0%");
    for (let i = 0; i <= 100; i++) {
      const t = i / 100;
      grad.append("stop")
        .attr("offset", `${i}%`)
        .attr("stop-color", pixelColor(VALUE_MIN + t * (VALUE_MAX - VALUE_MIN)));
    }
    lg.append("rect")
      .attr("width", LEGEND_THICK).attr("height", LEGEND_LONG)
      .attr("fill", "url(#pixelLegendGrad)").attr("rx", 3);
    const legendScale = d3.scaleLinear().domain([VALUE_MAX, VALUE_MIN]).range([0, LEGEND_LONG]);
    lg.append("g")
      .attr("transform", `translate(${LEGEND_THICK}, 0)`)
      .call(d3.axisRight(legendScale).ticks(5));
    lg.append("text")
      .attr("x", 0).attr("y", -12)
      .attr("font-weight", 500).text("Poverty");
  }

  // Draw gradient legend for choropleth
  svgChoroLegend.selectAll("*").remove();
  const defsL = svgChoroLegend.append("defs");
  const LEGEND_LEFT = 40, LEGEND_TOP = 40, LEGEND_LONG = 320, LEGEND_THICK = 15;
  const lg = svgChoroLegend.append("g")
    .attr("transform", `translate(${LEGEND_LEFT}, ${LEGEND_TOP})`)
    .style("pointer-events", "none");

  const grad = defsL.append("linearGradient")
    .attr("id", "choroLegendGrad")
    .attr("x1", "0%").attr("x2", "0%")
    .attr("y1", "100%").attr("y2", "0%");
  for (let i = 0; i <= 100; i++) {
    const t = i / 100;
    grad.append("stop")
      .attr("offset", `${i}%`)
      .attr("stop-color", choroColor(VALUE_MIN + t * (VALUE_MAX - VALUE_MIN)));
  }
  lg.append("rect")
    .attr("width", LEGEND_THICK).attr("height", LEGEND_LONG)
    .attr("fill", "url(#choroLegendGrad)").attr("rx", 3);
  const legendScale = d3.scaleLinear()
    .domain([VALUE_MAX, VALUE_MIN]).range([0, LEGEND_LONG]);
  lg.append("g")
    .attr("transform", `translate(${LEGEND_THICK}, 0)`)
    .call(d3.axisRight(legendScale).ticks(5));
  lg.append("text")
    .attr("x", 0).attr("y", -12)
    .attr("font-weight", 500).text("Poverty");

  startLoopOnce();
}

function renderState(stateFips, csvFile) {
  loadData(stateFips, csvFile).catch(e => {
    console.error(e);
    alert('Data load failed. Check console for details.');
  });
}

let mapInitialized = false;

Revisit.onDataReceive((data) => {
  if (mapInitialized) return;
  mapInitialized = true;
  const fips = data['stateFips'] || "08";
  const csv  = data['csvFile']   || "../Data/COData4.csv";
  renderState(fips, csv);
});

setTimeout(() => {
  if (!mapInitialized) {
    mapInitialized = true;
    renderState("08", "../Data/COData4.csv");
  }
}, 100);

const responseTextarea = document.getElementById('response-text');

Revisit.postAnswers({ pixelUncertaintySurveyResponse: '' });

responseTextarea.addEventListener('input', () => {
  Revisit.postAnswers({ pixelUncertaintySurveyResponse: responseTextarea.value });
});
</script>
</body>
</html>
