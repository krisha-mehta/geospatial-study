<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animated Pixel Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/d3-scale-chromatic.v3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="../../../revisitUtilities/revisit-communicate.js"></script>

<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0 auto;
    width: 650px;
    height: 600px;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #fff;
  }

  .wrap {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    justify-content: center;
    max-width: 760px;
    height: 400px;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
    background: #fff;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }

  #chart { max-width: 400px; }
  #legend { max-width: 140px; }

  #county-message-box {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }

  .selected-panel {
    max-width: 400px;
    margin: 30px auto 0;
    padding: 0 12px 8px;
    font-size: 14px;
    color: #111;
  }
  .selected-panel .chips {
    margin-top: 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    background: #f2f6ff;
    border: 1px solid #c9ddff;
    color: #0b3d91;
    line-height: 1;
    cursor: pointer;
  }
  .chip button.remove-chip {
    appearance: none;
    border: none;
    background: transparent;
    color: #0b3d91;
    font-size: 16px;
    line-height: 1;
    cursor: pointer;
    padding: 0 2px;
  }

  .county-interactive.highlight {
    stroke: #306de7 !important;
    stroke-width: 2.5 !important;
    pointer-events: none;
  }

  .county-interactive.hover-highlight {
    stroke: #306de7 !important;
    stroke-width: 2 !important;
  }

  .progress-container {
    position: relative;
    margin: 20px auto 10px auto;
    font-size: 12px;
    color: #222;
    max-width: 400px;
    text-align: left;
  }

  .progress-bar {
    width: 50%;
    height: 8px;
    background: #e9e9e9;
    border-radius: 4px;
    margin: 8px 0 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #306de7 0%, #0b5cff 100%);
    border-radius: 4px;
    transition: width 0.1s ease-out;
    width: 0%;
  }

  .progress-text {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="wrap">
  <svg id="chart" viewBox="0 0 400 400" aria-label="Animated pixel map of selected state"></svg>
  <svg id="legend" viewBox="0 0 140 400" aria-label="Legend"></svg>
</div>

<div id="progress-container" class="progress-container" style="display: none;">
  <div class="progress-text">
    <span id="frame-counter">Frame 1 / 50</span>
  </div>
  <div class="progress-bar">
    <div id="progress-fill" class="progress-fill"></div>
  </div>
</div>

<div id="selected-list" class="selected-panel" aria-live="polite"></div>

<div id="county-message-box"
     style="display:none; margin:0; padding:18px 22px; border:2px solid #0077cc; border-radius:14px;
            background:linear-gradient(135deg,rgba(247,251,255,0.85) 80%,rgba(227,242,253,0.85) 100%);
            max-width:320px; font-size:16px; box-shadow:0 4px 18px rgba(0,0,0,0.18); z-index:1000;
            position:absolute; transition:box-shadow 0.2s,transform 0.2s; opacity:0.92;"></div>

</body>
<script>
document.addEventListener('DOMContentLoaded', () => {

const CONFIG = {
  MOE_Z: 1.645,
  N_FRAMES: 50,
  FPS: 2.5,
  MAX_SELECTIONS: 3,
  REQUIRED_SELECTIONS: 3,
  VALUE_MIN: 0,
  VALUE_MAX: 50,
  PIXEL: 3
};

const color = d3.scaleSequential(d3.interpolateYlOrRd)
  .domain([CONFIG.VALUE_MIN, CONFIG.VALUE_MAX])
  .clamp(true);

function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function hashStr(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function randnFactory(rng) {
  let spare = null;
  return () => {
    if (spare !== null) { const v = spare; spare = null; return v; }
    let u = 0, v = 0, s = 0;
    do { u = rng() * 2 - 1; v = rng() * 2 - 1; s = u * u + v * v; } while (s === 0 || s >= 1);
    const m = Math.sqrt(-2 * Math.log(s) / s);
    spare = v * m;
    return u * m;
  };
}
function sampleValue(pov, moe, randn) {
  const sd = (moe ?? 0) / CONFIG.MOE_Z;
  const x = pov + (sd > 0 ? randn() * sd : 0);
  return Math.max(CONFIG.VALUE_MIN, Math.min(CONFIG.VALUE_MAX, x));
}

const norm = s => (s || "").normalize("NFD").replace(/\p{Diacritic}/gu, "").toLowerCase().trim();
const stripTypeSuffix = s =>
  s.replace(/\b(county|parish|borough|census area|municipio|municipality)\b/gi, "")
   .replace(/\s+/g, " ").trim();

const svgMap    = d3.select("#chart");
const svgLegend = d3.select("#legend");
const defsMap   = svgMap.append("defs");
const gPixels   = svgMap.append("g").attr("class", "pixels");
const gState    = svgMap.append("g").attr("class", "state");
const gCounties = svgMap.append("g").attr("class", "counties");

let projection = d3.geoEquirectangular();
let path = d3.geoPath(projection);

let selectedCounties = [];

let state = {
  frame: 0,
  frameValues: [],
  animationStarted: false
};

document.addEventListener('click', (event) => {
  const messageBox = document.getElementById('county-message-box');
  const map = document.getElementById('chart');
  if (!messageBox.contains(event.target) && !map.contains(event.target) && messageBox.style.display === 'block') {
    messageBox.style.display = 'none';
  }
});

function renderSelectedList() {
  const panel = document.getElementById('selected-list');
  const title = '<strong>Your selected counties:</strong>';
  if (!selectedCounties.length) {
    panel.innerHTML = `${title} <span style="color:#666;">None (need to select exactly ${CONFIG.REQUIRED_SELECTIONS})</span>`;
    return;
  }
  const chips = selectedCounties.map(c => (
    `<span class="chip" data-county="${c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}">
       <span>${c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span>
       <button class="remove-chip" type="button" aria-label="Remove ${c}" title="Remove ${c}" data-county="${c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}">&times;</button>
     </span>`
  )).join('');

  let statusMessage = '';
  if (selectedCounties.length < CONFIG.REQUIRED_SELECTIONS) {
    statusMessage = `<div style="margin-top: 8px; color: #d97706; font-size: 13px;">You need to select exactly ${CONFIG.REQUIRED_SELECTIONS} counties. Currently selected: ${selectedCounties.length}</div>`;
  } else if (selectedCounties.length === CONFIG.REQUIRED_SELECTIONS) {
    statusMessage = `<div style="margin-top: 8px; color: #059669; font-size: 13px;">✓ You have selected exactly ${CONFIG.REQUIRED_SELECTIONS} counties. You can proceed to the next step.</div>`;
  }

  panel.innerHTML = `${title}<div class="chips">${chips}</div>${statusMessage}`;
}

document.addEventListener('click', (ev) => {
  const btn = ev.target;
  if (!(btn instanceof HTMLElement)) return;
  if (!btn.classList.contains('remove-chip')) return;
  const county = btn.getAttribute('data-county');
  if (!county) return;
  selectedCounties = selectedCounties.filter(c => c !== county);

  if (selectedCounties.length === CONFIG.REQUIRED_SELECTIONS) {
    Revisit.postAnswers({ selectedCounty: selectedCounties });
    saveTrialToSession(selectedCounties);
  }

  d3.selectAll('.county-interactive').classed('highlight', false);
  if (selectedCounties.length < CONFIG.MAX_SELECTIONS) {
    gCounties.selectAll('.county-interactive').style('pointer-events', 'auto');
  }
  renderSelectedList();
});

document.addEventListener('mouseover', (ev) => {
  const chip = ev.target.closest('.chip');
  if (!chip) return;
  const county = chip.getAttribute('data-county');
  if (!county) return;
  d3.selectAll('.county-interactive').classed('highlight', function() {
    return d3.select(this).attr('data-county') === county;
  });
});
document.addEventListener('mouseout', (ev) => {
  const chip = ev.target.closest('.chip');
  if (!chip) return;
  d3.selectAll('.county-interactive').classed('highlight', false);
});

function updateProgressBar() {
  if (!state.animationStarted) return;
  const progressContainer = document.getElementById('progress-container');
  const progressFill = document.getElementById('progress-fill');
  const frameCounter = document.getElementById('frame-counter');
  const currentFrame = state.frame + 1;
  const progressPercent = (currentFrame / CONFIG.N_FRAMES) * 100;
  progressFill.style.width = progressPercent + '%';
  frameCounter.textContent = `Frame ${currentFrame} / ${CONFIG.N_FRAMES}`;
  progressContainer.style.display = 'block';
}

function renderFrame(k) {
  const frameIdx = (k % CONFIG.N_FRAMES + CONFIG.N_FRAMES) % CONFIG.N_FRAMES;
  state.frame = frameIdx;
  const vals = state.frameValues[frameIdx];
  gPixels.selectAll("rect").attr("fill", (d, i) => color(vals[i]));
  updateProgressBar();
}

let lastTick = 0;
function loop(ts) {
  const interval = 1000 / CONFIG.FPS;
  if (ts - lastTick >= interval) {
    lastTick = ts;
    if (!state.animationStarted) {
      state.animationStarted = true;
    }
    renderFrame(state.frame + 1);
  }
  requestAnimationFrame(loop);
}

let loopStarted = false;
function startLoopOnce() { if (!loopStarted) { loopStarted = true; requestAnimationFrame(loop); } }

async function loadData(stateFips, csvFile) {
  const isConnecticut = stateFips === '09';
  const width = 400, height = 400;

  const dataPromises = isConnecticut
    ? [
        d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json"),
        d3.csv(csvFile, d3.autoType),
        d3.json("../Connecticut_Planning_Region_WGS84_fast.geojson")
      ]
    : [
        d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json"),
        d3.csv(csvFile, d3.autoType)
      ];

  const results = await Promise.all(dataPromises);
  const usTopo = results[0];
  const csv = results[1];
  const ctPlanningRegions = isConnecticut ? results[2] : null;

  gPixels.selectAll("*").remove();
  gState.selectAll("*").remove();
  gCounties.selectAll("*").remove();
  defsMap.selectAll("*").remove();

  let stateCounties, stateMesh;

  if (isConnecticut && ctPlanningRegions) {
    stateCounties = ctPlanningRegions.features;
    const boundaries = [];
    for (const feature of stateCounties) {
      if (feature.geometry.type === 'Polygon') {
        boundaries.push(feature.geometry.coordinates[0]);
      } else if (feature.geometry.type === 'MultiPolygon') {
        feature.geometry.coordinates.forEach(poly => boundaries.push(poly[0]));
      }
    }
    stateMesh = { type: "MultiLineString", coordinates: boundaries };
  } else {
    const allCounties = topojson.feature(usTopo, usTopo.objects.counties).features;
    stateCounties = allCounties.filter(f => String(f.id).startsWith(stateFips));
    stateMesh = topojson.mesh(usTopo, usTopo.objects.counties,
      (a, b) => String(a.id).startsWith(stateFips) && String(b.id).startsWith(stateFips) && a !== b);
  }

  const stateFeature = topojson.feature(usTopo, usTopo.objects.states).features
    .find(f => String(f.id) === stateFips);

  const addCTRegionMapping = (nameToFipsMap, id, regPlanOrg, shortName) => {
    if (regPlanOrg) {
      nameToFipsMap.set(norm(regPlanOrg), id);
      const withoutCOG = regPlanOrg.replace(/\s*(Council of Governments|Regional Council of Governments)\s*$/gi, '').trim();
      nameToFipsMap.set(norm(withoutCOG), id);
    }
    if (shortName) nameToFipsMap.set(norm(shortName), id);
    const csvMappings = {
      'CRCOG': 'Capitol', 'CTMetro': 'Greater Bridgeport',
      'RiverCOG': 'Lower Connecticut River Valley', 'Naugatuck Valley': 'Naugatuck Valley',
      'NECCOG': 'Northeastern Connecticut', 'Northwest Hills': 'Northwest Hills',
      'SCRCOG': 'South Central Connecticut', 'SECCOG': 'Southeastern Connecticut',
      'Western CT': 'Western Connecticut'
    };
    if (csvMappings[shortName]) nameToFipsMap.set(norm(csvMappings[shortName]), id);
  };

  const nameToFipsMap = new Map();
  for (const f of stateCounties) {
    const id = String(f.id);
    if (isConnecticut && ctPlanningRegions) {
      addCTRegionMapping(nameToFipsMap, id, f.properties?.REGPLANORG || "", f.properties?.SHORT_NAME || "");
    } else {
      const raw = f.properties?.name ?? "";
      nameToFipsMap.set(norm(stripTypeSuffix(raw)), id);
      if (/\bsaint\b/i.test(raw)) {
        nameToFipsMap.set(norm(stripTypeSuffix(raw.replace(/\bsaint\b/gi, "st"))), id);
        nameToFipsMap.set(norm(stripTypeSuffix(raw.replace(/\bsaint\b/gi, "st."))), id);
      }
      if (/\bst[.]?\b/iu.test(raw)) {
        nameToFipsMap.set(norm(stripTypeSuffix(raw.replace(/\bst[.]?\b/giu, "saint"))), id);
      }
    }
  }

  const byFips = new Map();
  for (const r of csv) {
    const rawName = String(r.county ?? r.NAME ?? "");
    const key = isConnecticut ? norm(rawName) : norm(stripTypeSuffix(rawName));
    const fips = nameToFipsMap.get(key);
    if (fips) {
      byFips.set(fips, { pov: +r.pov, moe: +r.moe, name: rawName });
    } else {
      console.warn(`No FIPS match for county name: "${rawName}" in state FIPS ${stateFips}`);
    }
  }

  // Set up projection
  if (isConnecticut && ctPlanningRegions) {
    projection = d3.geoIdentity().reflectY(true);
    path = d3.geoPath(projection);
    projection.fitSize([width, height], { type: "FeatureCollection", features: stateCounties });
    const mergedBoundary = { type: "FeatureCollection", features: stateCounties };
    defsMap.append("clipPath").attr("id", "stateClip")
      .append("path").attr("d", path(mergedBoundary));
    gState.append("path")
      .attr("d", path(mergedBoundary))
      .attr("fill", "none").attr("stroke", "#1c1b1b").attr("stroke-width", 1.5)
      .attr("vector-effect", "non-scaling-stroke");
  } else {
    projection = d3.geoEquirectangular();
    path = d3.geoPath(projection);
    projection.fitSize([width, height], { type: "FeatureCollection", features: stateCounties });
    defsMap.append("clipPath").attr("id", "stateClip")
      .append("path").attr("d", path(stateFeature));
    gState.append("path")
      .attr("d", path(stateFeature))
      .attr("fill", "none").attr("stroke", "#1c1b1b").attr("stroke-width", 1.5)
      .attr("vector-effect", "non-scaling-stroke");
  }

  gCounties.append("path")
    .attr("d", path(stateMesh))
    .attr("fill", "none").attr("stroke", "#1c1b1b").attr("stroke-width", 1.2)
    .attr("vector-effect", "non-scaling-stroke");

  // Build pixel array (positions + county data)
  const pixels = [];
  for (let y = CONFIG.PIXEL / 2; y < height; y += CONFIG.PIXEL) {
    for (let x = CONFIG.PIXEL / 2; x < width; x += CONFIG.PIXEL) {
      const lonlat = projection.invert([x, y]);
      if (!lonlat) continue;
      let rec = null;
      for (const f of stateCounties) {
        if (d3.geoContains(f, lonlat)) { rec = byFips.get(String(f.id)); break; }
      }
      if (!rec) continue;
      pixels.push({ x, y, pov: rec.pov, moe: rec.moe });
    }
  }

  // Pre-compute all N_FRAMES independent pixel samplings
  const seed = Math.abs(((+new Date()) & 0xffffffff) ^ hashStr(stateFips + '|' + csvFile));
  const rng = mulberry32(seed);
  const randn = randnFactory(rng);
  const frameValues = [];
  for (let k = 0; k < CONFIG.N_FRAMES; k++) {
    const vals = new Float32Array(pixels.length);
    for (let i = 0; i < pixels.length; i++) {
      vals[i] = sampleValue(pixels[i].pov, pixels[i].moe, randn);
    }
    frameValues.push(vals);
  }
  state.frameValues = frameValues;
  state.frame = 0;

  // Draw pixel rects (fill set on first renderFrame call)
  gPixels.attr("clip-path", "url(#stateClip)")
    .selectAll("rect")
    .data(pixels)
    .join("rect")
      .attr("x", d => d.x - CONFIG.PIXEL / 2)
      .attr("y", d => d.y - CONFIG.PIXEL / 2)
      .attr("width", CONFIG.PIXEL)
      .attr("height", CONFIG.PIXEL)
      .attr("fill", (d, i) => color(frameValues[0][i]));

  // Interactive county overlay
  function showCountyMessageBox({ county, onYes, onNo }) {
    const box = document.getElementById("county-message-box");
    box.innerHTML = `Do you want to allocate your resources to <b>${county}</b>?<br><br>
      <button id='county-yes-btn' style='background:#0077cc;color:#fff;border:none;border-radius:6px;padding:7px 18px;margin-right:10px;cursor:pointer;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,0.08);'>Yes</button>
      <button id='county-no-btn' style='background:#fff;color:#0077cc;border:1.5px solid #0077cc;border-radius:6px;padding:7px 18px;cursor:pointer;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,0.08);'>No</button>`;
    box.style.display = "block";
    const svgEl = document.getElementById("chart");
    const svgRect = svgEl.getBoundingClientRect();
    box.style.position = "absolute";
    const countyFeature = stateCounties.find(f => (byFips.get(String(f.id))?.name ?? String(f.id)) === county);
    if (countyFeature) {
      const centroid = path.centroid(countyFeature);
      box.style.left = (svgRect.left + centroid[0]) + "px";
      box.style.top  = (svgRect.top  + centroid[1]) + "px";
      box.style.transform = "translate(-50%, 20px)";
    } else {
      box.style.left = (svgRect.left + 20) + "px";
      box.style.top  = (svgRect.top  + 20) + "px";
      box.style.transform = "none";
    }
    box.style.zIndex = 1000;
    document.getElementById("county-yes-btn").onclick = () => { box.style.display = "none"; onYes(); };
    document.getElementById("county-no-btn").onclick  = () => { box.style.display = "none"; onNo();  };
  }

  gCounties.selectAll(".county-interactive")
    .data(stateCounties)
    .join("path")
      .attr("class", "county-interactive")
      .attr("d", path)
      .attr("fill", "transparent")
      .attr("stroke", "none")
      .attr("data-county", d => byFips.get(String(d.id))?.name ?? String(d.id))
      .style("cursor", "pointer")
      .on("mouseover", function(event, d) {
        d3.select(this).classed("hover-highlight", true);
      })
      .on("mouseout", function(event, d) {
        d3.select(this).classed("hover-highlight", false);
      })
      .on("click", function(event, d) {
        const county = d3.select(this).attr("data-county");
        if (!selectedCounties.includes(county)) {
          if (selectedCounties.length >= CONFIG.MAX_SELECTIONS) return;
          showCountyMessageBox({
            county,
            onYes: () => {
              selectedCounties.push(county);
              if (selectedCounties.length === CONFIG.REQUIRED_SELECTIONS) {
                Revisit.postAnswers({ selectedCounty: selectedCounties });
                saveTrialToSession(selectedCounties);
              }
              renderSelectedList();
              if (selectedCounties.length === CONFIG.MAX_SELECTIONS) {
                gCounties.selectAll(".county-interactive")
                  .filter(function() { return !selectedCounties.includes(d3.select(this).attr("data-county")); })
                  .style("pointer-events", "none");
              }
            },
            onNo: () => {}
          });
        } else {
          const box = document.getElementById("county-message-box");
          box.innerHTML = `You have already selected this county to allocate resources.<br>To unselect, click on the <b>x</b> next to the county name below.<br><br>
            <button id='county-ok-btn' style='background:#0077cc;color:#fff;border:none;border-radius:6px;padding:7px 18px;cursor:pointer;font-size:15px;box-shadow:0 1px 4px rgba(0,0,0,0.08);'>OK</button>`;
          box.style.display = "block";
          const svgEl = document.getElementById("chart");
          const svgRect = svgEl.getBoundingClientRect();
          box.style.position = "absolute";
          const countyFeature = stateCounties.find(f => (byFips.get(String(f.id))?.name ?? String(f.id)) === county);
          if (countyFeature) {
            const centroid = path.centroid(countyFeature);
            box.style.left = (svgRect.left + centroid[0]) + "px";
            box.style.top  = (svgRect.top  + centroid[1]) + "px";
            box.style.transform = "translate(-50%, 20px)";
          } else {
            box.style.left = (svgRect.left + 20) + "px";
            box.style.top  = (svgRect.top  + 20) + "px";
            box.style.transform = "none";
          }
          box.style.zIndex = 1000;
          document.getElementById("county-ok-btn").onclick = () => { box.style.display = "none"; };
        }
      });

  renderSelectedList();

  // Legend
  svgLegend.selectAll("*").remove();
  const defsL = svgLegend.append("defs");
  const LEGEND_LEFT = 40, LEGEND_TOP = 40, LEGEND_LONG = 320, LEGEND_THICK = 15;
  const lg = svgLegend.append("g")
    .attr("class", "legend-right")
    .attr("transform", `translate(${LEGEND_LEFT}, ${LEGEND_TOP})`)
    .style("pointer-events", "none");

  const grad = defsL.append("linearGradient")
    .attr("id", "legendGrad")
    .attr("x1", "0%").attr("x2", "0%")
    .attr("y1", "100%").attr("y2", "0%");
  for (let i = 0; i <= 100; i++) {
    const t = i / 100;
    grad.append("stop")
      .attr("offset", `${i}%`)
      .attr("stop-color", color(CONFIG.VALUE_MIN + t * (CONFIG.VALUE_MAX - CONFIG.VALUE_MIN)));
  }
  lg.append("rect")
    .attr("width", LEGEND_THICK).attr("height", LEGEND_LONG)
    .attr("fill", "url(#legendGrad)").attr("rx", 3);
  const legendScale = d3.scaleLinear()
    .domain([CONFIG.VALUE_MAX, CONFIG.VALUE_MIN]).range([0, LEGEND_LONG]);
  lg.append("g")
    .attr("transform", `translate(${LEGEND_THICK}, 0)`)
    .call(d3.axisRight(legendScale).ticks(5));
  lg.append("text")
    .attr("x", 0).attr("y", -12)
    .attr("font-weight", 500)
    .text("Poverty");
}

function renderState(stateFips, csvFile) {
  selectedCounties = [];
  state.animationStarted = false;
  document.getElementById('progress-container').style.display = 'none';

  loadData(String(stateFips), csvFile)
    .then(startLoopOnce)
    .catch(err => {
      console.error('Error loading data:', err);
      alert("Data load failed: " + err.message + ". Check console for details.");
    });
}

function saveTrialToSession(counties) {
  try {
    const trialId = new URLSearchParams(window.location.search).get('trialid');
    if (!trialId) return;
    sessionStorage.setItem('trial_' + trialId, JSON.stringify(counties));
    const order = JSON.parse(sessionStorage.getItem('trial_order') || '[]');
    if (!order.includes(trialId)) {
      order.push(trialId);
      sessionStorage.setItem('trial_order', JSON.stringify(order));
    }
  } catch (e) { /* sessionStorage unavailable */ }
}

Revisit.onDataReceive((data) => {
  const stateFips = data['stateFips'];
  const csvFile   = data['csvFile'];
  renderState(stateFips, csvFile);
});

});
</script>
