<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shrinkage VSUP Map Survey Uncertainty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://d3js.org/d3-scale-chromatic.v3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="../../../revisitUtilities/revisit-communicate.js"></script>

<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0 auto;
    width: 900px;
    height: 600px;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: #fff;
  }

  .wrap {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
  }

  .map-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    min-width: 0;
    gap: 2px;
  }

  .map-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }

  .map-label {
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 0;
    text-align: center;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
    background: #fff;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }

  .county { stroke: #1c1b1b; stroke-width: 1.2; vector-effect: non-scaling-stroke; }
  .state-outline { fill: none; stroke: #1c1b1b; stroke-width: 1.5; vector-effect: non-scaling-stroke; }

  #svsup-map, #choropleth { flex: 1 1 0; min-width: 0; width: auto; }
  #svsup-legend, #choro-legend { width: 60px; flex-shrink: 0; align-self: center; }

  .response-container {
    max-width: 600px;
    margin: 30px auto;
    padding: 0 12px;
  }

  .response-label {
    display: block;
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 8px;
    color: #111;
  }

  .response-textarea {
    width: 100%;
    min-height: 120px;
    padding: 12px;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 14px;
    border: 2px solid #d1d5db;
    border-radius: 8px;
    resize: vertical;
    transition: border-color 0.2s;
  }

  .response-textarea:focus {
    outline: none;
    border-color: #2563eb;
  }

  .response-textarea::placeholder {
    color: #9ca3af;
  }

  .survey-title {
    font-size: 24px;
    font-weight: 700;
    color: #111;
    text-align: center;
    margin: 20px 0 10px 0;
  }
</style>
</head>
<body>

<h1 class="survey-title">Survey Questionnaire</h1>

<div class="wrap">
  <!-- Shrinkage VSUP map column -->
  <div class="map-col">
    <div class="map-label">Shrinkage VSUP Map</div>
    <div class="map-row">
      <svg id="svsup-map" viewBox="0 0 400 400" aria-label="Shrinkage VSUP map of selected state"></svg>
      <svg id="svsup-legend" viewBox="0 0 140 400" aria-label="Shrinkage VSUP legend"></svg>
    </div>
  </div>

  <div class="map-col">
    <div class="map-label">Choropleth Map</div>
    <div class="map-row">
      <svg id="choropleth" viewBox="0 0 400 400" aria-label="Choropleth map of selected state"></svg>
      <svg id="choro-legend" viewBox="0 0 140 400" aria-label="Poverty rate legend"></svg>
    </div>
  </div>
</div>

<div class="response-container">
  <label for="response-text" class="response-label">
Above, you can see two maps based on the same underlying data. The map on the right shows estimated poverty rates only. The map on the left (the one you just used) shows estimated poverty rates along with uncertainty information. Which of the two maps would you prefer to use for making decisions like the one in this experiment? Please explain your choice.</label>
  <textarea
    id="response-text"
    class="response-textarea"
    placeholder="Type your response here..."
    aria-label="Open response text box"></textarea>
</div>

<script>
const CONFIG = {
  MOE_Z: 1.645,
  SHRINKAGE_SCALE: 2 // >1 = less shrinkage, <1 = more shrinkage
};

const VALUE_MIN = 0, VALUE_MAX = 50;

const svgSvsup       = d3.select("#svsup-map");
const svgChoropleth  = d3.select("#choropleth");
const svgSvsupLegend = d3.select("#svsup-legend");
const svgChoroLegend = d3.select("#choro-legend");

// Shrinkage-adjusted poverty rate scale (0-50), and the raw choropleth scale — same domain so
// only the shrinkage adjustment (not the color scale) differs between the two maps.
const svsupColor = d3.scaleSequential(d3.interpolateYlOrRd)
  .domain([VALUE_MIN, VALUE_MAX])
  .clamp(true);

const choroColor = d3.scaleSequential(d3.interpolateYlOrRd)
  .domain([VALUE_MIN, VALUE_MAX])
  .clamp(true);

const norm = s => (s||"").normalize("NFD").replace(/\p{Diacritic}/gu,"").toLowerCase().trim();
const stripTypeSuffix = s =>
  s.replace(/\b(county|parish|borough|census area|municipio|municipality)\b/gi, "")
   .replace(/\s+/g, " ").trim();

const width = 400, height = 400;
const projection = d3.geoEquirectangular();
const path = d3.geoPath(projection);

// Grand mean poverty rate across all counties of all states (excluding Alaska,
// which is reserved for the practice trial), fetched once and cached.
let globalThetaPromise = null;
function getGlobalTheta() {
  if (!globalThetaPromise) {
    globalThetaPromise = d3.csv('../Data/AllStatesPov.csv', d3.autoType).then(rows => d3.mean(rows, d => d.pov));
  }
  return globalThetaPromise;
}

// Empirical-Bayes shrinkage: each county's poverty estimate is pulled toward
// a fixed reference point (theta = the grand mean poverty rate across all counties
// of all states, excluding Alaska), with the pull strength governed by the ratio of
// observation variance (from the margin of error) to the across-county variance (tau2).
// Higher-uncertainty counties shrink more.
function computeShrinkage(byFips, theta){
  const z = CONFIG.MOE_Z;
  const records = Array.from(byFips.values());
  const n = records.length;
  if (n === 0) return;

  const tau2 = d3.mean(records, d => (d.pov - theta) ** 2) * CONFIG.SHRINKAGE_SCALE;

  for (const rec of records){
    const se = (rec.moe ?? 0) / z;
    if (!(tau2 > 0) || !isFinite(tau2)) {
      rec.povAdj = theta;
    } else if (!(se > 0) || !isFinite(se)) {
      rec.povAdj = rec.pov;
    } else {
      const priorPrecision = 1 / tau2;
      const obsPrecision = 1 / (se * se);
      rec.povAdj = (priorPrecision * theta + obsPrecision * rec.pov) / (priorPrecision + obsPrecision);
    }
  }
}

let gFill, gOutline, stateCounties, byFips;

async function loadData(stateFips, csvFile) {
  const [[usTopo, csv], theta] = await Promise.all([
    Promise.all([
      d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json"),
      d3.csv(csvFile, d3.autoType)
    ]),
    getGlobalTheta()
  ]);

  const allCounties = topojson.feature(usTopo, usTopo.objects.counties).features;
  stateCounties = allCounties.filter(f => String(f.id).startsWith(stateFips));
  const stateFeature = topojson.feature(usTopo, usTopo.objects.states).features
    .find(f => String(f.id) === stateFips);

  projection.fitSize([width, height], { type: "FeatureCollection", features: stateCounties });

  const nameToFipsMap = new Map();
  for (const f of stateCounties) {
    const id = String(f.id);
    const raw = f.properties?.name ?? "";
    const base = norm(stripTypeSuffix(raw));
    nameToFipsMap.set(base, id);
    if (/\bsaint\b/i.test(raw)) {
      nameToFipsMap.set(norm(stripTypeSuffix(raw.replace(/\bsaint\b/gi, "st"))), id);
      nameToFipsMap.set(norm(stripTypeSuffix(raw.replace(/\bsaint\b/gi, "st."))), id);
    }
    if (/\bst[.]?\b/iu.test(raw)) {
      nameToFipsMap.set(norm(stripTypeSuffix(raw.replace(/\bst[.]?\b/giu, "saint"))), id);
    }
  }

  byFips = new Map();
  for (const r of csv) {
    const rawName = String(r.county ?? r.NAME ?? "");
    const key = norm(stripTypeSuffix(rawName));
    const fips = nameToFipsMap.get(key);
    if (fips) {
      byFips.set(fips, { pov: +r.pov, moe: +r.moe, name: rawName });
    } else {
      console.warn(`No FIPS match for "${rawName}" in state ${stateFips}`);
    }
  }

  computeShrinkage(byFips, theta);

  // Set up shrinkage VSUP map SVG layers
  svgSvsup.selectAll("*").remove();
  gFill    = svgSvsup.append("g").attr("class", "fills");
  gOutline = svgSvsup.append("g").attr("class", "outlines");
  gOutline.append("path")
    .datum(stateFeature)
    .attr("class", "state-outline")
    .attr("d", path);

  gFill.selectAll(".county")
    .data(stateCounties)
    .join("path")
      .attr("class", "county")
      .attr("d", path)
      .attr("fill", d => {
        const rec = byFips.get(String(d.id));
        return rec ? svsupColor(rec.povAdj) : "#ccc";
      });

  // Draw choropleth (raw pov values, YlOrRd) — same as hop-survey-uncertainty.html
  svgChoropleth.selectAll("*").remove();
  svgChoropleth.selectAll(".county-choro")
    .data(stateCounties)
    .join("path")
      .attr("class", "county-choro")
      .attr("d", path)
      .attr("fill", d => {
        const rec = byFips.get(String(d.id));
        return rec ? choroColor(rec.pov) : "#ccc";
      })
      .attr("stroke", "#1c1b1b")
      .attr("stroke-width", 1.2)
      .attr("vector-effect", "non-scaling-stroke");
  svgChoropleth.append("path")
    .datum(stateFeature)
    .attr("fill", "none")
    .attr("stroke", "#1c1b1b")
    .attr("stroke-width", 1.5)
    .attr("vector-effect", "non-scaling-stroke")
    .attr("d", path);

  // Gradient legend for the shrinkage VSUP map
  svgSvsupLegend.selectAll("*").remove();
  const defsS = svgSvsupLegend.append("defs");
  {
    const LEGEND_LEFT = 40, LEGEND_TOP = 40, LEGEND_LONG = 320, LEGEND_THICK = 15;
    const lg = svgSvsupLegend.append("g")
      .attr("transform", `translate(${LEGEND_LEFT}, ${LEGEND_TOP})`)
      .style("pointer-events", "none");
    const grad = defsS.append("linearGradient")
      .attr("id", "svsupLegendGrad")
      .attr("x1", "0%").attr("x2", "0%")
      .attr("y1", "100%").attr("y2", "0%");
    for (let i = 0; i <= 100; i++) {
      const t = i / 100;
      grad.append("stop")
        .attr("offset", `${i}%`)
        .attr("stop-color", svsupColor(VALUE_MIN + t * (VALUE_MAX - VALUE_MIN)));
    }
    lg.append("rect")
      .attr("width", LEGEND_THICK).attr("height", LEGEND_LONG)
      .attr("fill", "url(#svsupLegendGrad)").attr("rx", 3);
    const legendScale = d3.scaleLinear().domain([VALUE_MAX, VALUE_MIN]).range([0, LEGEND_LONG]);
    lg.append("g")
      .attr("transform", `translate(${LEGEND_THICK}, 0)`)
      .call(d3.axisRight(legendScale).ticks(5));
    const legendTitle = lg.append("text")
      .attr("x", 0)
      .attr("font-weight", 500)
      .attr("font-size", 11);
    legendTitle.append("tspan").attr("x", 0).attr("y", -26).text("Shrunk Poverty");
    legendTitle.append("tspan").attr("x", 0).attr("y", -14).text("Rate");
  }

  // Draw gradient legend for choropleth — same as hop-survey-uncertainty.html
  svgChoroLegend.selectAll("*").remove();
  const defsL = svgChoroLegend.append("defs");
  const LEGEND_LEFT = 40, LEGEND_TOP = 40, LEGEND_LONG = 320, LEGEND_THICK = 15;
  const lg = svgChoroLegend.append("g")
    .attr("transform", `translate(${LEGEND_LEFT}, ${LEGEND_TOP})`)
    .style("pointer-events", "none");

  const grad = defsL.append("linearGradient")
    .attr("id", "choroLegendGrad")
    .attr("x1", "0%").attr("x2", "0%")
    .attr("y1", "100%").attr("y2", "0%");
  for (let i = 0; i <= 100; i++) {
    const t = i / 100;
    grad.append("stop")
      .attr("offset", `${i}%`)
      .attr("stop-color", choroColor(VALUE_MIN + t * (VALUE_MAX - VALUE_MIN)));
  }
  lg.append("rect")
    .attr("width", LEGEND_THICK).attr("height", LEGEND_LONG)
    .attr("fill", "url(#choroLegendGrad)").attr("rx", 3);
  const legendScale = d3.scaleLinear()
    .domain([VALUE_MAX, VALUE_MIN]).range([0, LEGEND_LONG]);
  lg.append("g")
    .attr("transform", `translate(${LEGEND_THICK}, 0)`)
    .call(d3.axisRight(legendScale).ticks(5));
  lg.append("text")
    .attr("x", 0).attr("y", -12)
    .attr("font-weight", 500).attr("font-size", 11).text("Poverty");
}

function renderState(stateFips, csvFile) {
  loadData(stateFips, csvFile).catch(e => {
    console.error(e);
    alert('Data load failed. Check console for details.');
  });
}

let mapInitialized = false;

Revisit.onDataReceive((data) => {
  if (mapInitialized) return;
  mapInitialized = true;
  const fips = data['stateFips'] || "08";
  const csv  = data['csvFile']   || "../Data/COData4.csv";
  renderState(fips, csv);
});

setTimeout(() => {
  if (!mapInitialized) {
    mapInitialized = true;
    renderState("08", "../Data/COData4.csv");
  }
}, 100);

const responseTextarea = document.getElementById('response-text');

Revisit.postAnswers({ svsupUncertaintySurveyResponse: '' });

responseTextarea.addEventListener('input', () => {
  Revisit.postAnswers({ svsupUncertaintySurveyResponse: responseTextarea.value });
});
</script>
</body>
</html>
